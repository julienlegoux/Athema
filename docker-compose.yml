services:
  athema-server:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${ATHEMA_SERVER_PORT:-8080}:8080"
    environment:
      ATHEMA_SERVER_HOST: "0.0.0.0"
      ATHEMA_SERVER_PORT: "8080"
      ATHEMA_DB_HOST: postgres
      ATHEMA_DB_PORT: "5432"
      ATHEMA_DB_DATABASE: "${ATHEMA_DB_DATABASE:-athema}"
      ATHEMA_DB_USERNAME: "${ATHEMA_DB_USERNAME:-athema}"
      ATHEMA_DB_PASSWORD: "${ATHEMA_DB_PASSWORD:-athema_dev}"
      ATHEMA_DB_SSLMODE: "disable"
      ATHEMA_LOG_LEVEL: "${ATHEMA_LOG_LEVEL:-info}"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - athema

  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${ATHEMA_DB_DATABASE:-athema}"
      POSTGRES_USER: "${ATHEMA_DB_USERNAME:-athema}"
      POSTGRES_PASSWORD: "${ATHEMA_DB_PASSWORD:-athema_dev}"
    ports:
      - "${ATHEMA_DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ATHEMA_DB_USERNAME:-athema} -d ${ATHEMA_DB_DATABASE:-athema}"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - athema

volumes:
  pgdata:

networks:
  athema:
